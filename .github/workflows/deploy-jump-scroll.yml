name: Deploy jump-scroll
on:
  push:
    branches: [ master ]

jobs:
  deploy-jump-scroll:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - name: Find Commit Message # PHRASE_FOUND == deploy
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          FOUND="false"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "Initial push, skipping commit scan"
          elif git log ${BEFORE}..${AFTER} --format="%s %b" | grep -qi "jump-scroll@"; then
            FOUND="true"
          fi
          echo "PHRASE_FOUND=$FOUND" >> $GITHUB_ENV
      - name: Echo Status
        shell: bash
        run: |
          if [ "$PHRASE_FOUND" == "true" ]; then
            echo "DEPLOY JUMP-SCROLL"
          else
            echo "SKIP DEPLOY JUMP-SCROLL"
          fi
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Update npm
        if: env.PHRASE_FOUND == 'true'
        run: npm install -g npm@latest # ensure npm 11.5.1 or later
      - name: Install
        if: env.PHRASE_FOUND == 'true'
        run: npm ci
      - name: Publish jump-scroll
        if: env.PHRASE_FOUND == 'true'
        run: |
          npm run build
          cd src/jump-scroll
          npm publish --access public